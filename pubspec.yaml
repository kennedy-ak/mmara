name: mmara
description: "AI-powered legal first-aid assistant for Ghanaians."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.3

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.6.2

  # Networking
  dio: ^5.7.0
  connectivity_plus: ^6.1.0

  # Secure Storage
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.4

  # Models & Serialization
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Firebase
  firebase_core: ^3.9.0
  firebase_messaging: ^15.1.5
  flutter_local_notifications: ^18.0.1

  # UI & Utilities
  flutter_markdown: ^0.7.6
  intl: ^0.20.1
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.16
  url_launcher: ^6.3.1
  shimmer: ^3.0.0
  flutter_rating_bar: ^4.0.1
  package_info_plus: ^8.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code Generation
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  riverpod_generator: ^2.6.2

  # Testing
  mockito: ^5.4.4
  mocktail: ^1.0.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
